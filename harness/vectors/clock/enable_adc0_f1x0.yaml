name: enable_adc0_f1x0
description: |
  Enable the ADC0 clock and set its prescaler on the F1x0 (f1x0_rcu) clock path.
  The ADC needs no GPIO (the M2 anchor is the internal VREFINT / temperature
  channels). ADC0 is RCU_ADC = APB2EN bit 9. The F1x0 ADC has a dedicated clock
  derived from APB2 through a prescaler: at 72 MHz APB2 the default is CK_APB2 / 6
  = 12 MHz (within the 14 MHz ADC ceiling), set in RCU_CFG0 ADCPSC (bits[15:14]),
  and the F1x0 SPL also selects the APB2-derived ADC clock source in RCU_CFG2
  ADCSEL (bit 8).

  runtime-hal: clock::enable_adc(RCU, F1x0Rcu, Adc0) (enable bit + prescaler + select).
  GD SPL: rcu_periph_clock_enable(RCU_ADC) then rcu_adc_clock_config(RCU_ADCCK_APB2_DIV6).

# Mode rationale: final_state. The SPL rcu_adc_clock_config does a clear-then-set
# pair on each of RCU_CFG0 and RCU_CFG2 (four writes), so its ordered write list is
# longer than runtime-hal's single field-scoped RMW per register. The END STATE is
# identical, which is what matters for a clock-config golden, so final_state (the
# same mode the T2 clock-tree config goldens use) compares the per-address final
# value and ignores the SPL's redundant intermediate writes. End state:
#   APB2EN <RCU_BASE>+0x18 = 0x00000200  (bit 9, ADC)
#   CFG0   <RCU_BASE>+0x04 : ADCPSC bits[15:14] = 2 (CK_APB2/6) ORed onto the seed
#   CFG2   <RCU_BASE>+0x30 = 0x00000100  (bit 8, ADCSEL = APB2-derived source)
mode: final_state

implementations:
  gd-spl/gd32f1x0:
    includes: [gd32f1x0.h, gd32f1x0_rcu.h]
    body: |
      rcu_periph_clock_enable(RCU_ADC);
      rcu_adc_clock_config(RCU_ADCCK_APB2_DIV6);

  runtime-hal/gd32f1x0:
    body: |
      use runtime_hal::addr::PeriphLabel;
      use runtime_hal::clock::enable_adc;
      use runtime_hal::descriptor::ClockPath;

      const RCU_BASE: u32 = 0x4002_1000;

      pub fn body() {
          enable_adc(RCU_BASE, ClockPath::F1x0Rcu, PeriphLabel::Adc0).unwrap();
      }
