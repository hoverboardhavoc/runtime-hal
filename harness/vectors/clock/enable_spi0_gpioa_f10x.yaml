name: enable_spi0_gpioa_f10x
description: |
  Enable the peripheral clocks for SPI0 + GPIOA on the F10x (f10x_rcc) clock path.
  F10x puts BOTH the GPIO port enable (GPIOA = APB2EN bit 2) and SPI0 (APB2EN bit
  12) on APB2EN, so these are two RMWs to the SAME register, in order. Pure RMW
  writes, no polling.

  runtime-hal: clock::enable_gpio_port(RCU, F10xRcc, Gpioa) then
  clock::enable_spi(RCU, F10xRcc, Spi0).
  GD SPL: rcu_periph_clock_enable(RCU_GPIOA) then rcu_periph_clock_enable(RCU_SPI0).

# Mode rationale: register_writes (ordered). Both oracles emit two APB2EN RMWs in
# the same order (GPIOA bit 2, then SPI0 bit 12), so the second write observes the
# first's bit:
#   W4 APB2EN = 0x00000004  (bit 2,  GPIOA)         <RCU_BASE>+0x18
#   W4 APB2EN = 0x00001004  (bit 12 | bit 2, SPI0)  <RCU_BASE>+0x18
mode: register_writes

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_rcu.h]
    body: |
      rcu_periph_clock_enable(RCU_GPIOA);
      rcu_periph_clock_enable(RCU_SPI0);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::addr::PeriphLabel;
      use runtime_hal::clock::{enable_gpio_port, enable_spi};
      use runtime_hal::descriptor::ClockPath;

      const RCU_BASE: u32 = 0x4002_1000;

      pub fn body() {
          enable_gpio_port(RCU_BASE, ClockPath::F10xRcc, PeriphLabel::Gpioa).unwrap();
          enable_spi(RCU_BASE, ClockPath::F10xRcc, PeriphLabel::Spi0).unwrap();
      }
