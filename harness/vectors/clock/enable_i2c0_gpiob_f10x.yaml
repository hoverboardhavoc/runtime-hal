name: enable_i2c0_gpiob_f10x
description: |
  Enable the peripheral clocks for the IMU I2C link (I2C0 + GPIOB) on the F10x
  (f10x_rcc) clock path. F10x puts GPIO port enables on APB2EN (GPIOB = APB2EN
  bit 3) and I2C0 on APB1EN (bit 21). Pure RMW writes, no polling.

  runtime-hal: clock::enable_gpio_port(RCU, F10xRcc, Gpiob) then
  clock::enable_i2c(RCU, F10xRcc, I2c0).
  GD SPL: rcu_periph_clock_enable(RCU_GPIOB) then rcu_periph_clock_enable(RCU_I2C0).

# Mode rationale: register_writes (ordered writes, reads ignored). Two writes, in
# order, to different registers (the F10x GPIO enable lives on APB2EN, not AHBEN):
#   W4 APB2EN = 0x00000008  (bit 3,  GPIOB)  <RCU_BASE>+0x18
#   W4 APB1EN = 0x00200000  (bit 21, I2C0)   <RCU_BASE>+0x1C
mode: register_writes

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_rcu.h]
    body: |
      rcu_periph_clock_enable(RCU_GPIOB);
      rcu_periph_clock_enable(RCU_I2C0);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::addr::PeriphLabel;
      use runtime_hal::clock::{enable_gpio_port, enable_i2c};
      use runtime_hal::descriptor::ClockPath;

      const RCU_BASE: u32 = 0x4002_1000;

      pub fn body() {
          enable_gpio_port(RCU_BASE, ClockPath::F10xRcc, PeriphLabel::Gpiob).unwrap();
          enable_i2c(RCU_BASE, ClockPath::F10xRcc, PeriphLabel::I2c0).unwrap();
      }
