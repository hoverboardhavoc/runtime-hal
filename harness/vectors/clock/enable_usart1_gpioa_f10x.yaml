name: enable_usart1_gpioa_f10x
description: |
  Enable the peripheral clocks for USART1 + GPIOA on the F10x (f10x_rcc) clock
  path. F10x puts GPIO port enables on APB2EN (GPIOA = APB2EN bit 2) and USART1
  on APB1EN (bit 17). Pure RMW writes that set one enable bit each, no polling.

  runtime-hal: clock::enable_gpio_port(RCU, F10xRcc, Gpioa) then
  clock::enable_usart(RCU, F10xRcc, Usart1).
  GD SPL: rcu_periph_clock_enable(RCU_GPIOA) then rcu_periph_clock_enable(RCU_USART1).

# Mode rationale: register_writes (ordered writes, reads ignored). Both oracles
# emit two writes in the same order:
#   W4 APB2EN = 0x00000004  (bit 2,  GPIOA)   <RCU_BASE>+0x18
#   W4 APB1EN = 0x00020000  (bit 17, USART1)  <RCU_BASE>+0x1C
# Note the F10x GPIO enable lives on APB2EN (not AHBEN, which F10x does not use
# for GPIO), the family-divergent bit the clock path encodes.
mode: register_writes

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_rcu.h]
    body: |
      rcu_periph_clock_enable(RCU_GPIOA);
      rcu_periph_clock_enable(RCU_USART1);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::addr::PeriphLabel;
      use runtime_hal::clock::{enable_gpio_port, enable_usart};
      use runtime_hal::descriptor::ClockPath;

      const RCU_BASE: u32 = 0x4002_1000;

      pub fn body() {
          enable_gpio_port(RCU_BASE, ClockPath::F10xRcc, PeriphLabel::Gpioa).unwrap();
          enable_usart(RCU_BASE, ClockPath::F10xRcc, PeriphLabel::Usart1).unwrap();
      }
