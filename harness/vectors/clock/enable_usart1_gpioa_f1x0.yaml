name: enable_usart1_gpioa_f1x0
description: |
  Enable the peripheral clocks for USART1 + GPIOA on the F1x0 (f1x0_rcu) clock
  path. F1x0 puts GPIO port enables on AHBEN (GPIOA = AHBEN bit 17) and USART1 on
  APB1EN (bit 17). Pure RMW writes that set one enable bit each, no polling.

  runtime-hal: clock::enable_gpio_port(RCU, F1x0Rcu, Gpioa) then
  clock::enable_usart(RCU, F1x0Rcu, Usart1).
  GD SPL: rcu_periph_clock_enable(RCU_GPIOA) then rcu_periph_clock_enable(RCU_USART1).

  Order: GPIOA clock then USART1 clock, matching the bench link_gpio_init /
  link_usart_init order in ~/dev/uart-bench-test/src/main.c.

# Mode rationale: register_writes (ordered writes, reads ignored). Each enable is
# a single RMW (read the enable reg, OR one bit, write back). Both oracles emit
# exactly two writes in the same order:
#   W4 AHBEN  = 0x00020000  (bit 17, GPIOA)   <RCU_BASE>+0x14
#   W4 APB1EN = 0x00020000  (bit 17, USART1)  <RCU_BASE>+0x1C
# Different registers (AHBEN vs APB1EN), so no ordering ambiguity; the diff is
# fully ordered and width-strict.
mode: register_writes

implementations:
  gd-spl/gd32f1x0:
    includes: [gd32f1x0.h, gd32f1x0_rcu.h]
    body: |
      rcu_periph_clock_enable(RCU_GPIOA);
      rcu_periph_clock_enable(RCU_USART1);

  runtime-hal/gd32f1x0:
    body: |
      use runtime_hal::addr::PeriphLabel;
      use runtime_hal::clock::{enable_gpio_port, enable_usart};
      use runtime_hal::descriptor::ClockPath;

      const RCU_BASE: u32 = 0x4002_1000;

      pub fn body() {
          enable_gpio_port(RCU_BASE, ClockPath::F1x0Rcu, PeriphLabel::Gpioa).unwrap();
          enable_usart(RCU_BASE, ClockPath::F1x0Rcu, PeriphLabel::Usart1).unwrap();
      }
