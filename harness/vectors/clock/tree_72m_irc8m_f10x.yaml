name: tree_72m_irc8m_f10x
description: |
  Full clock-tree bring-up to 72 MHz from IRC8M -> PLL on the F10x (f10x_rcc)
  path: flash wait states, source-stable poll, AHB/APB prescalers, PLL mul + src,
  PLL-enable + lock poll, SCS switch + confirm. The F10x counterpart of
  clock_tree_72m_irc8m_f1x0; M2 T2's config golden on F10x.

  runtime-hal: clock::configure_tree(&chip, &ClockConfig::REFERENCE_72M_IRC8M).
  GD SPL: the equivalent of system_gd32f10x.c system_clock_72m_irc8m (fmc_wscnt_set
    first; RCU_CTL IRC8MEN + stable; RCU_CFG0 AHB/APB prescalers; PLL_MUL18 with
    PLLSEL clear = IRC8M/2; PLLEN + PLLSTB; SCS = PLL + SCSS confirm).

  The F10x register layout matches F1x0 here (RCU_CTL = RCU_CTL0 at 0x00, CFG0 at
  0x04, identical bit positions), and the vendor F10x system_clock_72m_irc8m
  already uses APB1 = AHB/2, so this F10x SPL snippet IS the vendor recipe's
  target tree (no APB1 reconciliation needed, unlike F1x0). runtime-hal programs
  the same default 72 MHz profile, so both reach the same end state.

  CLOCK-1 / silicon anchor: deferred human bench pass reads RCU CTL/CFG0 over SWD.

# Mode rationale: final_state, same as the F1x0 clock vector (the SPL `&=`/`|=`
# RMW pairs differ in count/order from runtime-hal's field-scoped modify, so the
# end state per register is the correctness criterion). Status polls use the
# OR-MASK read form so the accumulated config bits survive while the poll exits.
#   FMC_WS  = 0x00000002  (WSCNT = 2)                                 <FMC_BASE>+0x00
#   RCU_CTL  final = 0x03000003 (IRC8MEN | PLLEN over scripted status) <RCU_BASE>+0x00
#   RCU_CFG0 final = 0x0804040A (PLLMF mul18 | APB1PSC/2 | SCS+SCSS PLL)<RCU_BASE>+0x04
mode: final_state

# CTL (0x00) ORs IRC8MSTB (bit1) | PLLSTB (bit25); CFG0 (0x04) ORs SCSS = PLL
# (0x8). OR-MASK preserves the accumulated config bits (see the F1x0 vector).
# CLOCK-1: SPL-derived masks; re-seed from a silicon RCU capture at the bench.
read_responses:
  "<RCU_BASE>+0x00": { or: 0x02000002 }
  "<RCU_BASE>+0x04": { or: 0x00000008 }

# Configure from reset: override the shared RCU_CFG0 seed (the usart vectors use a
# pre-configured tree there) back to 0.
reset_overrides:
  "<RCU_BASE>+0x00": 0x00000000
  "<RCU_BASE>+0x04": 0x00000000
  "<FMC_BASE>+0x00": 0x00000000

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_rcu.h, gd32f10x_fmc.h]
    body: |
      /* flash wait states first */
      fmc_wscnt_set(WS_WSCNT_2);
      /* enable IRC8M, wait until stable */
      RCU_CTL |= RCU_CTL_IRC8MEN;
      while(0U == (RCU_CTL & RCU_CTL_IRC8MSTB)){}
      /* AHB = SYSCLK, APB2 = AHB/1, APB1 = AHB/2 */
      RCU_CFG0 &= ~RCU_CFG0_AHBPSC;
      RCU_CFG0 |= RCU_AHB_CKSYS_DIV1;
      RCU_CFG0 &= ~RCU_CFG0_APB2PSC;
      RCU_CFG0 |= RCU_APB2_CKAHB_DIV1;
      RCU_CFG0 &= ~RCU_CFG0_APB1PSC;
      RCU_CFG0 |= RCU_APB1_CKAHB_DIV2;
      /* CK_PLL = (CK_IRC8M/2) * 18 = 72 MHz (PLLSEL clear = IRC8M/2) */
      RCU_CFG0 &= ~RCU_CFG0_PLLSEL;
      RCU_CFG0 &= ~(RCU_CFG0_PLLMF | RCU_CFG0_PLLMF_4);
      RCU_CFG0 |= RCU_PLL_MUL18;
      /* enable PLL, wait for lock */
      RCU_CTL |= RCU_CTL_PLLEN;
      while(0U == (RCU_CTL & RCU_CTL_PLLSTB)){}
      /* switch system clock to PLL, confirm */
      RCU_CFG0 &= ~RCU_CFG0_SCS;
      RCU_CFG0 |= RCU_CKSYSSRC_PLL;
      while(RCU_SCSS_PLL != (RCU_CFG0 & RCU_CFG0_SCSS)){}

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::{Chip, McuDescriptor, AddrTable, PeriphLabel};
      use runtime_hal::{AdcPath, ClockPath, GpioPath, IrqLayout, PageSize};
      use runtime_hal::clock::{configure_tree, ClockConfig};

      fn chip() -> Chip {
          let mut addrs = AddrTable::new();
          addrs.set(PeriphLabel::Rcu, 0x4002_1000);
          Chip::from_descriptor(McuDescriptor {
              gpio: GpioPath::ApbCrlCrh, clock: ClockPath::F10xRcc, adc: AdcPath::Single,
              irq: IrqLayout::F10xSeparate, addrs, flash_page: PageSize::K1, flash_kib: 64, adv_timers: 1, adc_count: 1,
          })
      }

      pub fn body() {
          let _ = configure_tree(&chip(), &ClockConfig::REFERENCE_72M_IRC8M);
      }
