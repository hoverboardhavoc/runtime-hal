name: transfer_loopback_f1x0
description: |
  SPI transfer-sequencing golden (M2 T9, with_polling) on the F1x0 family: a 2-byte
  full-duplex transfer (the unit a MOSI/MISO loopback exercises) traced with
  read_responses stubbing the STAT flag progression (TBE then RBNE, per byte) so the
  polled loops terminate and the ordered reads + writes trace. This proves
  runtime-hal sequences the polled full-duplex handshake the way the GD SPL polled
  example does (poll TBE, write DATA, poll RBNE, read DATA), and that it does NOT
  DROP a poll (proceed before TBE/RBNE is set, the F130 hang-if-done-wrong class). A
  dropped poll changes the ordered read trace and the planted-bug self-test catches
  it (test_selftest.py dropped-poll mutation on this vector).

  Like the I2C transfer_whoami with_polling vector, this is a HARNESS self-test of
  runtime-hal's poll behaviour (driven from pytest with and without the stub), not a
  two-oracle compare: the SPL's polled example and runtime-hal both poll STAT in the
  same order, but an ordered read+write diff against the SPL would diverge on coding
  style (loop shape), not on whether the polls happen. The SPI block layout is
  identical on both families, so transfer_loopback_f10x carries the same body.

  runtime-hal: Spi::bring_up(...); transfer_byte(0xA5); transfer_byte(0x5A).
  Sequence (the polled full-duplex handshake, per byte):
    wait TBE -> write DATA (the TX byte) -> wait RBNE -> read DATA (the RX byte).

  SEED PROVENANCE / re-seed flag (T9 caveat, the SPI analogue of the I2C / CLOCK-1
  seeds): the STAT stub sequence below is SPL-DERIVED -- it is the exact set of flags
  the SPL polled example / runtime-hal poll, in the order they poll them (TBE then
  RBNE, per byte), NOT a silicon capture. It must be RE-SEEDED from a real STAT
  read-back captured over SWD during the on-silicon MOSI/MISO loopback in T13 (write
  a byte pattern, read it back equal), the same way the I2C handshake and clock poll
  stubs are to be re-seeded. Until then this proves agreement-with-the-SPL-sequence,
  not silicon flag values.

# with_polling: ordered reads + writes; a dropped poll is a failure (not just a
# wrong value). The pytest drives extraction directly (stub vs no-stub), so the mode
# documents intent.
mode: with_polling

# STAT (0x08) is read once at each poll point; with the satisfying flag present on
# the first read, each wait_flag does exactly one read. The list is the ordered STAT
# values across the whole 2-byte transfer:
#   0x02 TBE   (byte 0: data register empty, ready for the TX byte)
#   0x01 RBNE  (byte 0: received byte available)
#   0x02 TBE   (byte 1)
#   0x01 RBNE  (byte 1)
read_responses:
  "<SPI0_BASE>+0x08": [0x02, 0x01, 0x02, 0x01]

implementations:
  runtime-hal/gd32f1x0:
    body: |
      use runtime_hal::{Chip, McuDescriptor, AddrTable, PeriphLabel};
      use runtime_hal::{AdcPath, ClockPath, GpioPath, IrqLayout, PageSize};
      use runtime_hal::spi::Spi;
      use runtime_hal::clock::ClockConfig;
      use runtime_hal::config::{SpiConfig, NssMode};

      fn chip() -> Chip {
          let mut addrs = AddrTable::new();
          addrs.set(PeriphLabel::Spi0, 0x4001_3000);
          Chip::from_descriptor(McuDescriptor {
              gpio: GpioPath::AhbCtlAfsel, clock: ClockPath::F1x0Rcu, adc: AdcPath::Single,
              irq: IrqLayout::F1x0Grouped, addrs, flash_page: PageSize::K1, flash_kib: 64, adv_timers: 1, adc_count: 1,
          })
      }

      pub fn body() {
          let cfg = SpiConfig { spi: PeriphLabel::Spi0, sck: 0x05, miso: 0x06, mosi: 0x07, nss: 0x04,
              mode: 0, data16: false, target_hz: 1_000_000, lsb_first: false, nss_mode: NssMode::Software };
          let dev = Spi::bring_up(&chip(), &ClockConfig::REFERENCE_72M_IRC8M, &cfg).unwrap();
          // Full-duplex 2-byte transfer (the loopback unit). transfer_byte is exactly what the
          // embedded-hal SpiBus impl (read/write/transfer/transfer_in_place) is built from: poll
          // TBE, write DATA, poll RBNE, read DATA. The inherent calls avoid pulling the SpiBus
          // trait into the snippet crate while tracing the identical sequence; the trait surface is
          // covered by host tests.
          let _ = dev.transfer_byte(0xA5);
          let _ = dev.transfer_byte(0x5A);
      }
