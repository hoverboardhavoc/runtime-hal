name: route_general_pwm_pin_pb3_f10x
description: |
  GPIO alternate-function routing for the general-purpose-timer PWM output
  (TIMER1_CH1 -> PB3) on the F10x (apb_crl_crh) GPIO model, via the public
  chip.route_general_pwm_pin(PB3) router. On the F10x there is no per-pin AF mux:
  TIMER1_CH1 lands on PB3 only after the AFIO TIMER1 partial remap (0b01), and PB3 is a
  JTAG-overlay pin, so the router first frees the JTAG-DP (SWJ_CFG = SW-only), sets
  the AFIO TIMER1 partial remap, then sets PB3's CRL alternate-function nibble.

  runtime-hal: chip.route_general_pwm_pin(0x13).
  GD SPL: rcu_periph_clock_enable(RCU_AF); gpio_pin_remap_config(GPIO_SWJ_SWDPENABLE_REMAP, ENABLE);
          gpio_pin_remap_config(GPIO_TIMER1_PARTIAL_REMAP0, ENABLE);
          gpio_init(GPIOB, GPIO_MODE_AF_PP, GPIO_OSPEED_50MHZ, GPIO_PIN_3).

# Mode rationale: final_state, scoped with assert_only to the GPIOB CRL register only (the PB3
# AF-PP nibble), where runtime-hal and the SPL AGREE (both -> 0x4444B444).
#
# Naming/oracle correction: the SPL macro for the PB3-targeting TIMER1 partial remap is
# GPIO_TIMER1_PARTIAL_REMAP0 (0x00180100, field 0b01 = TIMER1_CH1 / PB3), NOT
# GPIO_TIMER1_PARTIAL_REMAP1 (0x00180200, field 0b10 = TIMER1_CH2/CH3 / PB10/PB11). An earlier
# version of this vector called PARTIAL_REMAP1 (0b10), which disagreed with the HAL's correct 0b01
# and produced a spurious AFIO_PCF0 TIMER1_REMAP divergence. With PARTIAL_REMAP0 the TIMER1_REMAP
# field now AGREES: runtime-hal writes 0b01 (bit8) and the SPL writes 0b01 (bit8).
#
# Remaining divergence (reported, NOT papered over): the AFIO_PCF0 (+0x04) end state still does not
# match as a full word because the SWJ_CFG field differs, so the register is excluded from the
# compare:
#   runtime-hal route_general_pwm_pin -> 0x02000100  (SWJ_CFG=0b010 SW-only at [26:24]; TIMER1_REMAP
#     = 0b01 at bit8)
#   GD SPL  GPIO_SWJ_SWDPENABLE_REMAP + GPIO_TIMER1_PARTIAL_REMAP0 -> 0x0F000100 (the SPL packed-macro
#     decode lands SWJ in [27:24]; TIMER1_REMAP = 0b01 at bit8, matching the HAL)
# The TIMER1_REMAP field now agrees (both 0b01); the SWJ_CFG field width/position is the only AFIO
# divergence, a separate runtime-hal-vs-SPL encoding difference. The GPIOB AF nibble (the pin's
# drive type) agrees and is the part this vector pins.
mode: final_state

assert_only:
  - "<GPIOB_BASE>+0x00"   # CRL: PB3 AF-PP nibble (runtime-hal == SPL == 0x4444B444)

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_gpio.h, gd32f10x_rcu.h]
    body: |
      rcu_periph_clock_enable(RCU_AF);
      gpio_pin_remap_config(GPIO_SWJ_SWDPENABLE_REMAP, ENABLE);
      gpio_pin_remap_config(GPIO_TIMER1_PARTIAL_REMAP0, ENABLE);
      gpio_init(GPIOB, GPIO_MODE_AF_PP, GPIO_OSPEED_50MHZ, GPIO_PIN_3);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::{Chip, McuDescriptor, AddrTable, PeriphLabel};
      use runtime_hal::{AdcPath, ClockPath, GpioPath, IrqLayout, PageSize};

      pub fn body() {
          let mut addrs = AddrTable::new();
          addrs.set(PeriphLabel::Rcu, 0x4002_1000);
          addrs.set(PeriphLabel::Gpiob, 0x4001_0C00);
          let chip = Chip::from_descriptor(McuDescriptor {
              gpio: GpioPath::ApbCrlCrh, clock: ClockPath::F10xRcc, adc: AdcPath::Single,
              irq: IrqLayout::F10xSeparate, addrs, flash_page: PageSize::K2, flash_kib: 256, adv_timers: 1, adc_count: 1,
          });
          let _ = chip.route_general_pwm_pin(0x13); // PB3 = TIMER1_CH1 (AFIO partial remap, 0b01)
      }
