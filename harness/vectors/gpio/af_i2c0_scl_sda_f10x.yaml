name: af_i2c0_scl_sda_f10x
description: |
  GPIO alternate-function config for the I2C0 link SCL = PB6 / SDA = PB7 as AF
  open-drain on the F10x (apb_crl_crh) GPIO model. F10x has no separate AF-mux or
  pull register: AF open-drain is the CTL0/CTL1 4-bit nibble GPIO_MODE_AF_OD =
  0x1C -> low nibble 0xC, output so OR the 50 MHz speed 0x3 -> nibble 0xF. The I2C
  pull-up is the board's external bus resistor (the SPL gpio_init(AF_OD) writes no
  pull/BOP), so the F10x write is the open-drain nibble only.

  runtime-hal: configure_af(GPIOB_BASE, ApbCrlCrh, PB6/PB7, I2cAfOpenDrain).
  GD SPL: gpio_init(GPIOB, GPIO_MODE_AF_OD, GPIO_OSPEED_50MHZ, GPIO_PIN_6 | GPIO_PIN_7).

# Mode rationale: final_state. Pins 6 and 7 both live in CTL0; both oracles RMW the
# open-drain nibble 0xF into nibble 6 (bits[27:24]) and nibble 7 (bits[31:28]),
# over the 0x44444444 reset. End state:
#   CTL0 +0x00 = 0x44444444 with nibbles 6,7 -> 0xF = 0xFF444444.
# (The contrast with the SPI AF-PP vector, nibble 0xB, is exactly the
# open-drain-vs-push-pull slip the width-strict golden catches.)
# After the refactor the only public path that routes I2C pins is I2c::new, which
# routes BOTH SCL (PB6) and SDA (PB7) and also programs the I2C0 + RCU registers and,
# since the bus-clear (I2c::new configure_output_od before configure_af), touches
# GPIOB CTL0 open-drain nibbles before the AF write. Both the bus-clear OD config and
# the final AF-OD write land in CTL0 (+0x00), and the AF write is last, so the CTL0
# END STATE is unchanged; scope the compare to CTL0 (+0x00) only.
mode: final_state

assert_only:
  - "<GPIOB_BASE>+0x00"   # CTL0 only (PB6/PB7 nibbles; the AF-OD write is the last writer)

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_gpio.h]
    body: |
      gpio_init(GPIOB, GPIO_MODE_AF_OD, GPIO_OSPEED_50MHZ, GPIO_PIN_6 | GPIO_PIN_7);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::{Chip, McuDescriptor, AddrTable, PeriphLabel};
      use runtime_hal::{AdcPath, ClockPath, GpioPath, IrqLayout, PageSize};
      use runtime_hal::i2c::I2c;
      use runtime_hal::I2cMode;
      use runtime_hal::clock::ClockConfig;

      pub fn body() {
          let mut addrs = AddrTable::new();
          addrs.set(PeriphLabel::Rcu, 0x4002_1000);
          addrs.set(PeriphLabel::Gpiob, 0x4001_0C00);
          addrs.set(PeriphLabel::I2c0, 0x4000_5400);
          let chip = Chip::from_descriptor(McuDescriptor {
              gpio: GpioPath::ApbCrlCrh, clock: ClockPath::F10xRcc, adc: AdcPath::Single,
              irq: IrqLayout::F10xSeparate, addrs, flash_page: PageSize::K2, flash_kib: 256, adv_timers: 1, adc_count: 1,
          });
          let pins = chip.gpiob().unwrap().split();
          let _ = I2c::new(&chip, &ClockConfig::REFERENCE_72M_IRC8M, PeriphLabel::I2c0,
              (pins.pb6, pins.pb7), I2cMode::standard(100_000)).unwrap();
      }
