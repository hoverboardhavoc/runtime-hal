name: af_spi0_pins_f1x0
description: |
  GPIO alternate-function config for the representative SPI0 pins SCK = PA5, MISO =
  PA6, MOSI = PA7 on the F1x0 (ahb_ctl_afsel) GPIO model. SCK/MOSI are AF
  push-pull outputs; MISO is an AF input (no output drive). SPI0 is on AF0 for
  F1x0 (the gd32f1x0 AF table), so the AFSEL nibbles are 0 while CTL routes the
  pins through the AF mux. The pinout is representative descriptor data; the point
  is the AF-push-pull config path, not a board-specific pinout.

  runtime-hal: configure_af(PA5, SpiAfPushPull), configure_af(PA6, SpiInput),
  configure_af(PA7, SpiAfPushPull).
  GD SPL: gpio_mode_set(AF, NONE) + gpio_af_set(AF_0) for all three +
  gpio_output_options_set(OTYPE_PP, 50MHZ) for SCK | MOSI.

# Mode rationale: final_state (multi-pin, register-at-a-time SPL vs pin-at-a-time
# runtime-hal). End state:
#   CTL    +0x00 : AF (2) at pins 5,6,7 -> (2<<10)|(2<<12)|(2<<14)
#   PUD    +0x0C : no pull -> 0
#   AFSEL0 +0x20 : AF0 -> 0 (both oracles write 0; CTL=AF does the routing)
#   OMODE  +0x04 : push-pull -> 0
#   OSPD   +0x08 : 50MHz (3) at pins 5,7 only (MISO is input) -> (3<<10)|(3<<14)
# AFSEL1 is the SPL's no-op rewrite (both leave it 0); ignored.
mode: final_state

ignore:
  - "<GPIOA_BASE>+0x24"   # AFSEL1: SPL no-op rewrite; runtime-hal skips it (both leave it 0)

implementations:
  gd-spl/gd32f1x0:
    includes: [gd32f1x0.h, gd32f1x0_gpio.h]
    body: |
      gpio_mode_set(GPIOA, GPIO_MODE_AF, GPIO_PUPD_NONE, GPIO_PIN_5 | GPIO_PIN_6 | GPIO_PIN_7);
      gpio_af_set(GPIOA, GPIO_AF_0, GPIO_PIN_5 | GPIO_PIN_6 | GPIO_PIN_7);
      gpio_output_options_set(GPIOA, GPIO_OTYPE_PP, GPIO_OSPEED_50MHZ, GPIO_PIN_5 | GPIO_PIN_7);

  runtime-hal/gd32f1x0:
    body: |
      use runtime_hal::descriptor::GpioPath;
      use runtime_hal::gpio::{configure_af, PinRole};

      const GPIOA_BASE: u32 = 0x4800_0000;

      pub fn body() {
          configure_af(GPIOA_BASE, GpioPath::AhbCtlAfsel, 5, PinRole::SpiAfPushPull); // SCK
          configure_af(GPIOA_BASE, GpioPath::AhbCtlAfsel, 6, PinRole::SpiInput);      // MISO
          configure_af(GPIOA_BASE, GpioPath::AhbCtlAfsel, 7, PinRole::SpiAfPushPull); // MOSI
      }
