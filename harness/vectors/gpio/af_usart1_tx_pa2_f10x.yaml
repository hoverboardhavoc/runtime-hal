name: af_usart1_tx_pa2_f10x
description: |
  GPIO alternate-function routing for the USART1 TX/RX pins (PA2 = TX, PA3 = RX)
  on the F10x (apb_crl_crh) GPIO model. After the runtime-hal refactor the only
  public path that routes a USART pin is Usart::new(chip, clock, Usart1, (pa2,
  pa3), baud), which routes BOTH pins at once: TX = AF push-pull 50 MHz (CTL0
  nibble 0xB), RX = floating input (CTL0 nibble 0x4). Both pins live in CTL0, so
  this vector traces Usart::new and compares the GPIOA window.

  runtime-hal: chip.gpioa().split(); Usart::new(chip, REFERENCE_72M_IRC8M, Usart1,
               (pa2, pa3), 115200).
  GD SPL: gpio_init(AF_PP, PA2) + gpio_init(IN_FLOATING, PA3).

# Mode rationale: final_state scoped to GPIOA (assert_only). F10x has no AF mux;
# AF is the CTL0 nibble. End state:
#   CTL0 +0x00 : reset 0x44444444, nibble 2 (PA2 TX) -> 0xB, nibble 3 (PA3 RX) ->
#                0x4 (floating input, == reset). Final = 0x44444B44.
# RX's floating-input nibble equals the reset value, so only the TX nibble moves.
mode: final_state

assert_only:
  - "<GPIOA_BASE>"

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_gpio.h]
    body: |
      gpio_init(GPIOA, GPIO_MODE_AF_PP, GPIO_OSPEED_50MHZ, GPIO_PIN_2);
      gpio_init(GPIOA, GPIO_MODE_IN_FLOATING, GPIO_OSPEED_50MHZ, GPIO_PIN_3);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::{Chip, McuDescriptor, AddrTable, PeriphLabel};
      use runtime_hal::{AdcPath, ClockPath, GpioPath, IrqLayout, PageSize};
      use runtime_hal::usart::Usart;
      use runtime_hal::clock::ClockConfig;

      pub fn body() {
          let mut addrs = AddrTable::new();
          addrs.set(PeriphLabel::Rcu, 0x4002_1000);
          addrs.set(PeriphLabel::Gpioa, 0x4001_0800);
          addrs.set(PeriphLabel::Usart1, 0x4000_4400);
          let chip = Chip::from_descriptor(McuDescriptor {
              gpio: GpioPath::ApbCrlCrh, clock: ClockPath::F10xRcc, adc: AdcPath::Single,
              irq: IrqLayout::F10xSeparate, addrs, flash_page: PageSize::K2, flash_kib: 256, adv_timers: 1, adc_count: 1,
          });
          let pins = chip.gpioa().unwrap().split();
          let _ = Usart::new(&chip, &ClockConfig::REFERENCE_72M_IRC8M, PeriphLabel::Usart1,
              (pins.pa2, pins.pa3), 115200).unwrap();
      }
