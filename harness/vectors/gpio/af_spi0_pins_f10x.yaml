name: af_spi0_pins_f10x
description: |
  GPIO alternate-function config for the representative SPI0 pins SCK = PA5, MISO =
  PA6, MOSI = PA7 on the F10x (apb_crl_crh) GPIO model. F10x has no AF-mux: AF is
  implied by the CTL0/CTL1 nibble. SCK/MOSI are AF push-pull 50 MHz = nibble 0xB;
  MISO is a floating input = nibble 0x4. The pinout is representative descriptor
  data; the point is the AF-push-pull config path.

  Restored after the API refactor: Spi::bring_up configures only the SPI peripheral
  registers and writes no GPIO, so there is no Spi::new that routes the pins. The
  public path that routes a SPI pin's AF is now Chip::route_spi_pin(pin, role) (the
  SPI analogue of Chip::route_advanced_pwm_pin), one call per pin, mirroring how the
  TIMER0 gate vector reaches its AF config through a public Chip routing method.

  runtime-hal: route_spi_pin(PA5, SpiAfPushPull), route_spi_pin(PA6, SpiInput),
  route_spi_pin(PA7, SpiAfPushPull).
  GD SPL: gpio_init(GPIO_MODE_AF_PP) for SCK | MOSI; gpio_init(GPIO_MODE_IN_FLOATING)
  for MISO.

# Mode rationale: final_state. Pins 5,6,7 all live in CTL0; both oracles RMW the
# nibbles over the 0x44444444 reset. End state:
#   CTL0 +0x00 = 0x44444444 with nibble5 -> 0xB (SCK), nibble7 -> 0xB (MOSI),
#                nibble6 -> 0x4 (MISO floating input = the reset nibble)
#              = 0xB4B44444.
# (The AF-PP nibble 0xB vs the I2C AF-OD nibble 0xF is the push-pull-vs-open-drain
# slip the width-strict golden catches.)
mode: final_state

ignore:
  - "<RCU_BASE>"   # route_spi_pin enables the GPIOA port clock (APB2EN); the SPL body omits it

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_gpio.h]
    body: |
      gpio_init(GPIOA, GPIO_MODE_AF_PP, GPIO_OSPEED_50MHZ, GPIO_PIN_5 | GPIO_PIN_7);
      gpio_init(GPIOA, GPIO_MODE_IN_FLOATING, GPIO_OSPEED_50MHZ, GPIO_PIN_6);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::{AddrTable, AdcPath, ClockPath, GpioPath, IrqLayout, McuDescriptor, PageSize, PeriphLabel};
      use runtime_hal::Chip;
      use runtime_hal::gpio::PinRole;

      pub fn body() {
          let mut addrs = AddrTable::new();
          addrs.set(PeriphLabel::Rcu, 0x4002_1000);
          addrs.set(PeriphLabel::Gpioa, 0x4001_0800);
          let chip = Chip::from_descriptor(McuDescriptor {
              gpio: GpioPath::ApbCrlCrh,
              clock: ClockPath::F10xRcc,
              adc: AdcPath::Single,
              irq: IrqLayout::F10xSeparate,
              addrs,
              flash_page: PageSize::K2, flash_kib: 256,
              adv_timers: 1,
              adc_count: 1,
          });
          // SCK = PA5, MISO = PA6, MOSI = PA7.
          let _ = chip.route_spi_pin(0x05, PinRole::SpiAfPushPull); // SCK
          let _ = chip.route_spi_pin(0x06, PinRole::SpiInput);      // MISO
          let _ = chip.route_spi_pin(0x07, PinRole::SpiAfPushPull); // MOSI
      }
