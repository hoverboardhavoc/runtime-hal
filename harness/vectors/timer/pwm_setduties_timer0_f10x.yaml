name: pwm_setduties_timer0_f10x
description: |
  M3 T5: bring up the complementary bridge via the ComplementaryPwm trait, then write the three
  phase duties through the resolve-once handle. This traces the SAME T3/T4 config writes as
  pwm_bringup_timer0_f10x PLUS the three CHxCV duty writes, matching the SPL compare-value writes
  (timer_channel_output_pulse_value_config). It proves the trait's configure -> PwmHandle path and
  set_duties land at the right compare offsets, byte-for-byte vs the SPL, both families
  (pwm_setduties_timer0_f10x).

  runtime-hal: PwmController::new().configure(&chip, &PwmConfig{..}) -> PwmHandle; then
    handle.set_duties([750, 1125, 1500]) writes CH0CV/CH1CV/CH2CV. MOE stays OFF (the handle cannot
    arm; the ArmGate is separate, DECISIONS.md #4 + SAFETY).
  GD SPL: the pwm_bringup config sequence, then timer_channel_output_pulse_value_config(CH0,750) /
    (CH1,1125) / (CH2,1500). No timer_primary_output_config (MOE OFF).

# Mode rationale: final_state. Same registers as pwm_bringup, but the three phase compares now hold
# the duties instead of 0:
#   CH0CV  +0x34 : duty 750                                              0x000002EE
#   CH1CV  +0x38 : duty 1125                                            0x00000465
#   CH2CV  +0x3C : duty 1500                                            0x000005DC
#   CCHP   +0x44 : DTCFG 0x1C | ROS | IOS, break+MOE OFF                0x00000C1C  (MOE bit 15 clear)
# (All other config registers as in pwm_bringup_timer0_f10x.)
mode: final_state

implementations:
  gd-spl/gd32f10x:
    includes: [gd32f10x.h, gd32f10x_timer.h, gd32f10x_rcu.h]
    body: |
      timer_parameter_struct tp;
      tp.prescaler        = 0U;
      tp.alignedmode      = TIMER_COUNTER_CENTER_UP;
      tp.counterdirection = TIMER_COUNTER_UP;
      tp.clockdivision    = TIMER_CKDIV_DIV2;
      tp.period           = 2250U;
      tp.repetitioncounter= 0U;
      timer_init(TIMER0, &tp);

      timer_oc_parameter_struct oc;
      oc.outputstate  = TIMER_CCX_ENABLE;
      oc.outputnstate = TIMER_CCXN_ENABLE;
      oc.ocpolarity   = TIMER_OC_POLARITY_HIGH;
      oc.ocnpolarity  = TIMER_OCN_POLARITY_LOW;
      oc.ocidlestate  = TIMER_OC_IDLE_STATE_HIGH;
      oc.ocnidlestate = TIMER_OCN_IDLE_STATE_HIGH;

      timer_channel_output_config(TIMER0, TIMER_CH_0, &oc);
      timer_channel_output_mode_config(TIMER0, TIMER_CH_0, TIMER_OC_MODE_PWM0);
      timer_channel_output_shadow_config(TIMER0, TIMER_CH_0, TIMER_OC_SHADOW_ENABLE);
      timer_channel_output_pulse_value_config(TIMER0, TIMER_CH_0, 0U);

      timer_channel_output_config(TIMER0, TIMER_CH_1, &oc);
      timer_channel_output_mode_config(TIMER0, TIMER_CH_1, TIMER_OC_MODE_PWM0);
      timer_channel_output_shadow_config(TIMER0, TIMER_CH_1, TIMER_OC_SHADOW_ENABLE);
      timer_channel_output_pulse_value_config(TIMER0, TIMER_CH_1, 0U);

      timer_channel_output_config(TIMER0, TIMER_CH_2, &oc);
      timer_channel_output_mode_config(TIMER0, TIMER_CH_2, TIMER_OC_MODE_PWM0);
      timer_channel_output_shadow_config(TIMER0, TIMER_CH_2, TIMER_OC_SHADOW_ENABLE);
      timer_channel_output_pulse_value_config(TIMER0, TIMER_CH_2, 0U);

      timer_auto_reload_shadow_enable(TIMER0);

      timer_break_parameter_struct bp;
      bp.runoffstate     = TIMER_ROS_STATE_ENABLE;
      bp.ideloffstate    = TIMER_IOS_STATE_ENABLE;
      bp.deadtime        = 0x1CU;
      bp.breakpolarity   = TIMER_BREAK_POLARITY_LOW;
      bp.outputautostate = TIMER_OUTAUTO_DISABLE;
      bp.protectmode     = TIMER_CCHP_PROT_OFF;
      bp.breakstate      = TIMER_BREAK_DISABLE;
      timer_break_config(TIMER0, &bp);

      /* The per-cycle handle's set_duties([750,1125,1500]). MOE stays OFF. */
      timer_channel_output_pulse_value_config(TIMER0, TIMER_CH_0, 750U);
      timer_channel_output_pulse_value_config(TIMER0, TIMER_CH_1, 1125U);
      timer_channel_output_pulse_value_config(TIMER0, TIMER_CH_2, 1500U);

  runtime-hal/gd32f10x:
    body: |
      use runtime_hal::{Chip, McuDescriptor, AddrTable, PeriphLabel};
      use runtime_hal::{AdcPath, ClockPath, GpioPath, IrqLayout, PageSize};
      use runtime_hal::timer::{ComplementaryPwm, PwmController};
      use runtime_hal::config::{BreakConfig, PwmChannelConfig, PwmConfig, PwmAlign, OcMode, ClockDiv, TrgoSource};

      fn chip() -> Chip {
          let mut addrs = AddrTable::new();
          addrs.set(PeriphLabel::Timer0, 0x4001_2C00);
          Chip::from_descriptor(McuDescriptor {
              gpio: GpioPath::ApbCrlCrh, clock: ClockPath::F10xRcc, adc: AdcPath::Single,
              irq: IrqLayout::F10xSeparate, addrs, flash_page: PageSize::K1, adv_timers: 1, adc_count: 1,
          })
      }

      pub fn body() {
          let ch = |high: u8, low: u8| PwmChannelConfig { high, low, polarity: true, idle_high: true, idle_high_n: true };
          let cfg = PwmConfig {
              timer: PeriphLabel::Timer0,
              channels: [ch(0x08, 0x1D), ch(0x09, 0x1E), ch(0x0A, 0x1F)],
              period: 2250, prescaler: 0, dead_time: 0x1C,
              brk: BreakConfig { enabled: false, level: false },
              trigger_compare: 2249,
              align: PwmAlign::Center2, arse: true, trigger_oc_mode: OcMode::Pwm0,
              trigger_ch_enable: false, crep: 0, ckdiv: ClockDiv::Div2, trgo_src: TrgoSource::Update,
          };
          let h = PwmController::new().configure(&chip(), &cfg).unwrap();
          // Per-cycle duty write through the resolve-once handle. MOE untouched (ArmGate's job).
          h.set_duties([750, 1125, 1500]).unwrap();
      }
