name: inject_bringup_adc0_f1x0
description: |
  ADC0 timer-triggered INJECTED (inserted) conversion-group bring-up (M3 T8) on the F1x0 family:
  two phase-current channels (4, 5) at 7.5-cycle sample time, LEFT-aligned, the injected external
  trigger source = TIMER0 CH3, the injected end-of-conversion (EOIC) interrupt enabled, ADC enabled.
  No conversion (the calibration poll is the separate inject_calibrate vector; the trigger-then-read
  sequence is inject_read). This is M3 T8's config golden: runtime-hal's injected-group config writes
  reach the same END STATE as the GD SPL adc_* injected recipe.

  The injected register block is identical on both families (gd32f1x0_adc.h / gd32f10x_adc.h: ISQ
  0x38, IDATA0..3 0x3C..0x48, STAT EOIC bit 2, CTL0 EOICIE bit 7, CTL1 ETSIC[14:12] / ETEIC bit 15,
  DAL bit 11), so the same vector runs on F10x (inject_bringup_adc0_f10x); the family difference is
  the SPL adc_* signatures (F10x passes ADCx + the ADC0_1_EXTTRIG_INSERTED_* macro).

  runtime-hal: Adc::configure_injected(ADC0_BASE, &[(4,1),(5,1)], true, ETSIC_T0_CH3). Programs DAL
    (left), ISQ IL = len-1, the per-rank ISQ channel fields (SPL reversed packing) + per-channel
    SAMPT, ETSIC = TIMER0 CH3 (code 1), ETEIC, CTL0 EOICIE, ADCON. (The calibration RSTCLB/CLB poll
    is split into inject_calibrate, exactly as the M2 regular bring-up split it.)
  GD SPL: adc_data_alignment_config(ADC_DATAALIGN_LEFT);
          adc_channel_length_config(ADC_INSERTED_CHANNEL, 2);
          adc_inserted_channel_config(0, ADC_CHANNEL_4, ADC_SAMPLETIME_7POINT5);
          adc_inserted_channel_config(1, ADC_CHANNEL_5, ADC_SAMPLETIME_7POINT5);
          adc_external_trigger_source_config(ADC_INSERTED_CHANNEL, ADC_EXTTRIG_INSERTED_T0_CH3);
          adc_external_trigger_config(ADC_INSERTED_CHANNEL, ENABLE);
          adc_interrupt_enable(ADC_INT_EOIC);
          adc_enable();

  TRIGGER-MATRIX INVARIANT (test_timer.py, now complete with the T6 trgo_trigger vector): the timer
  CH3 compare sits at ~CAR-1 (2249) AND the ADC injected ETSIC field selects exactly TIMER0 CH3
  (code 1). This is the single cross-peripheral check that proves the timer->ADC coupling.

  Silicon (T13/T10, NOT this task): the injected EOC firing at the PWM centre at the PWM rate. This
  golden proves agreement-with-SPL config, not silicon timing.

# Mode rationale: final_state (per-register final written value; reads ignored).
#
# API-FORCED SCOPING (post-refactor): the ONLY public injected path is
# InjectedAdcController::configure, which runs the injected-group config AND calibration (the RSTCLB/
# CLB poll). Calibration is a polled self-clearing-bit sequence on CTL1 that Unicorn cannot model
# cleanly (a REPLACE stub clobbers CTL1's accumulated config bits; an OR-mask stub cannot clear a
# bit software just wrote). So this two-oracle config golden is scoped with assert_only to the
# calibration-FREE injected config registers, excluding CTL1 (which calibration perturbs):
#   CTL0   +0x04 : EOICIE (bit 7)                                          0x00000080
#   SAMPT1 +0x10 : ch4 (3*4=12) + ch5 (3*5=15) sample-time = 1 each        0x00009000
#   ISQ    +0x38 : IL=1 (len-1, 1<<20); rank0 ch4 @10; rank1 ch5 @15       0x00129000
# CTL1's ETSIC/ETEIC (the timer->ADC coupling) is validated separately by
# test_trigger_matrix_invariant, which reads the raw runtime-hal CTL1 write (ETSIC=1, ETEIC set hold
# regardless of the trailing calibration bit). runtime-hal here calibrates (its poll bounded-times-out
# under Unicorn, no stub needed); the SPL body is config-only (CTL1 out of the compare scope).
mode: final_state

assert_only:
  - "<ADC0_BASE>+0x04"   # CTL0 EOICIE
  - "<ADC0_BASE>+0x10"   # SAMPT1
  - "<ADC0_BASE>+0x38"   # ISQ

implementations:
  gd-spl/gd32f1x0:
    includes: [gd32f1x0.h, gd32f1x0_adc.h]
    body: |
      adc_data_alignment_config(ADC_DATAALIGN_LEFT);
      adc_channel_length_config(ADC_INSERTED_CHANNEL, 2U);
      adc_inserted_channel_config(0U, ADC_CHANNEL_4, ADC_SAMPLETIME_7POINT5);
      adc_inserted_channel_config(1U, ADC_CHANNEL_5, ADC_SAMPLETIME_7POINT5);
      adc_external_trigger_source_config(ADC_INSERTED_CHANNEL, ADC_EXTTRIG_INSERTED_T0_CH3);
      adc_external_trigger_config(ADC_INSERTED_CHANNEL, ENABLE);
      adc_interrupt_enable(ADC_INT_EOIC);
      adc_enable();

  runtime-hal/gd32f1x0:
    body: |
      use runtime_hal::Chip;
      use runtime_hal::detect::descriptor_f130;
      use runtime_hal::PeriphLabel;
      use runtime_hal::adc::TriggeredAdc;
      use runtime_hal::adc::InjectedAdcController;
      use runtime_hal::config::{InjectedAdcConfig, InjectedChannel, TimerTriggerLink, AdcClockDiv};

      pub fn body() {
          // Two phase-current channels (4, 5) at 7.5-cycle sample time (code 1), left-aligned,
          // triggered by TIMER0 CH3. The only public injected path is InjectedAdcController::configure,
          // which programs the injected group AND runs calibration (RSTCLB/CLB poll). The SPL body here
          // therefore ALSO calibrates, so both oracles reach the same CTL1 end state; the calibration
          // poll is stubbed via read_responses so the bounded loops exit.
          let chip = Chip::from_descriptor(descriptor_f130());
          let mut channels = heapless::Vec::new();
          let _ = channels.push(InjectedChannel { channel: 4, sample_time: 1 });
          let _ = channels.push(InjectedChannel { channel: 5, sample_time: 1 });
          let cfg = InjectedAdcConfig {
              adc: PeriphLabel::Adc0,
              channels,
              left_aligned: true,
              trigger_timer: PeriphLabel::Timer0,
              trigger_link: TimerTriggerLink::Ch3,
              clock_div: AdcClockDiv::Div6,
          };
          let _ = InjectedAdcController::new().configure(&chip, &cfg);
      }
