name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build / fmt / clippy / host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (firmware target)
        run: cargo clippy --target thumbv7m-none-eabi -- -D warnings
      - name: build (firmware target)
        run: cargo build --target thumbv7m-none-eabi
      # The firmware bin crates are built explicitly here. There is no workspace, so each is built by
      # --manifest-path. firmware/ is ONE source (the chip is detected at runtime); the f103 / f130
      # feature now selects only the linker memory.x (RAM size), so both link variants are built (the
      # f130 build needs --no-default-features to turn the default f103 off). The bench-fw/ crates are
      # the on-silicon validators: bench-fw/coldpath (cold-path peripheral bring-up), bench-fw/detect
      # (family detection acceptance), bench-fw/probe (peripheral-presence measurement). All are no_std
      # thumbv7m-none-eabi images.
      - name: build firmware (f103 memory layout)
        run: cargo build --manifest-path firmware/Cargo.toml --target thumbv7m-none-eabi --features f103
      - name: build firmware (f130 memory layout, no-default)
        run: cargo build --manifest-path firmware/Cargo.toml --target thumbv7m-none-eabi --no-default-features --features f130
      - name: build bench-fw/coldpath
        run: cargo build --manifest-path bench-fw/coldpath/Cargo.toml --target thumbv7m-none-eabi
      - name: build bench-fw/detect
        run: cargo build --manifest-path bench-fw/detect/Cargo.toml --target thumbv7m-none-eabi
      - name: build bench-fw/probe
        run: cargo build --manifest-path bench-fw/probe/Cargo.toml --target thumbv7m-none-eabi
      # G1 (descriptor-rework DR-T8): the host tests need --features mock. The src/*/tests.rs
      # modules use crate::reg::mock + std (the host-only mock register space), which are gated
      # behind the `mock` feature, so a bare `cargo test` fails to compile them. The modules are
      # also self-gated `#![cfg(feature = "mock")]` so a stray bare `cargo test` at least compiles
      # (it then runs an empty unit-test set), but the REAL host suite is this --features mock run.
      - name: host tests (tier 1)
        # register-model conformance, family -> descriptor synthesis, embedded-hal cold-path
        # transaction lists (see TESTING.md "Test layering")
        run: cargo test --features mock
      # Optional: clippy over the host (mock) build, so the test/mock-only code is linted too.
      - name: clippy (host / mock)
        run: cargo clippy --features mock -- -D warnings

  # TODO (see TESTING.md):
  # - tier 2: Unicorn register-trace diff vs the GD SPL goldens, as a matrix over
  #   {gd32f1x0, gd32f10x} x divergent peripherals. Needs the regtrace harness + the GD SPL tree.
  # - tier 3 + HIL (UART, on-hardware): self-hosted runner / manual dispatch, off the PR path.
